events {
    worker_connections 1024;
}

http {
    upstream house_counter {
        server house-counter:8008;
    }

    upstream front_back_garden {
        server front-back-garden:8000;
    }

    server {
        listen 80;

        # Extended timeouts to accommodate long-running map generation requests
        # house-counter zoom 18 can take ~20 min; garden precompute can take several minutes
        proxy_read_timeout    1600s;
        proxy_send_timeout    1600s;
        proxy_connect_timeout 10s;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location /version {
            alias /usr/share/nginx/html/version.json;
            add_header Content-Type application/json;
        }

        # /buildings/* → house-counter (strips the /buildings prefix)
        location /buildings/ {
            proxy_pass http://house_counter/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /garden/* → front-back-garden (strips the /garden prefix)
        location /garden/ {
            proxy_pass http://front_back_garden/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
