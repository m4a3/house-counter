services:
  house-counter:
    build: ./house-counter
    expose:
      - "8008"
    volumes:
      - building_cache:/app/building_cache
    env_file:
      - .env
    restart: unless-stopped

  front-back-garden:
    build: ./front-back-garden
    expose:
      - "8000"
    volumes:
      - garden_output:/app/output
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - house-counter
      - front-back-garden
    restart: unless-stopped

volumes:
  building_cache:
  garden_output:
