name: App Build

on:
  pull_request:
    branches:
      - 'main-test'
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-west-1
  AWS_DEFAULT_REGION: eu-west-1
  ECR_REPO: house-counter-tags

jobs:
  get-ref-name:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-ref-name.outputs.version }}
      image_tag: ${{ steps.get-ref-name.outputs.image_tag }}
    steps:
      - name: Get ref_name
        id: get-ref-name
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            sanitized_ref=$(echo ${{ github.head_ref }} | sed 's/[^a-zA-Z0-9.]/-/g')
          elif [ "${{ github.event_name }}" == "create" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            sanitized_ref=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9.]/-/g')
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sanitized_ref="manual-${GITHUB_SHA::7}"
          else
            sanitized_ref=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9.]/-/g')
          fi
          echo "version=$sanitized_ref" >> $GITHUB_OUTPUT
          echo "image_tag=$sanitized_ref" >> $GITHUB_OUTPUT

  build_feature:
    needs: [get-ref-name]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build info
        env:
          VERSION: ${{ needs.get-ref-name.outputs.version }}
          IMAGE_TAG: ${{ needs.get-ref-name.outputs.image_tag }}
        run: |
          echo "Building version: $VERSION"
          echo "Image tag: $IMAGE_TAG"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ needs.get-ref-name.outputs.image_tag }}
          VERSION: ${{ needs.get-ref-name.outputs.version }}
          ECR_URL: ${{ steps.login-ecr.outputs.registry }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Dockerfile
          provenance: false
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.source=${{ github.event.repository.clone_url }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ env.ECR_URL }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_URL }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Image info
        env:
          ECR_URL: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.get-ref-name.outputs.image_tag }}
        run: |
          echo "::notice::Image pushed: ${{ env.ECR_URL }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
