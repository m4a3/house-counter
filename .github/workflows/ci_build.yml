name: App Build

on: 
  pull_request:
    branches:
      - 'main-test'
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-west-1
  AWS_DEFAULT_REGION: eu-west-1
  ECR_REPO: house-counter-tags

jobs:
  get-ref-name:
    runs-on: ubuntu-latest
    outputs:
      ref_name: ${{ steps.get-ref-name.outputs.ref_name }}
    steps:
      - name: Get ref_name
        id: get-ref-name
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            sanitized_ref=$(echo ${{ github.head_ref }} | sed 's/[^a-zA-Z0-9.]/-/g')
          elif [ "${{ github.event_name }}" == "create" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            sanitized_ref=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9.]/-/g')
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            sanitized_ref="manual-${GITHUB_SHA::7}"
          else
            sanitized_ref=$(echo ${{ github.ref_name }} | sed 's/[^a-zA-Z0-9.]/-/g')
          fi
          echo "ref_name=$sanitized_ref" >> $GITHUB_OUTPUT

  build_feature:
    needs: [get-ref-name]
    if: github.event_name == 'pull_request' && github.base_ref == 'main-test'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ needs.get-ref-name.outputs.ref_name }}
          ECR_URL: 245475270127.dkr.ecr.eu-west-1.amazonaws.com
        run: |
          docker build \
            --build-arg APP_VERSION=$IMAGE_TAG \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -t $ECR_URL/$ECR_REPO:$IMAGE_TAG . -f Dockerfile
          docker push $ECR_URL/$ECR_REPO:$IMAGE_TAG