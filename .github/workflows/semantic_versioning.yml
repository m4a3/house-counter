name: Generate SemVer Tag and Build Env Versions
on:
  push:
    branches: [ main-test ]
  workflow_dispatch:

env:
  GH_PACKAGE_ACCESS_TOKEN: ${{ secrets.GH_PACKAGE_ACCESS_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-west-1
  AWS_DEFAULT_REGION: eu-west-1
  ECR_REPO: house-counter-tags

jobs:
  release:
    runs-on: ubuntu-latest

    outputs:
      tag_version: ${{ steps.get_current_tag.outputs.tag_version }}
      previous_tag: ${{ steps.get_previous_tag.outputs.previous_tag }}
      version_released: ${{ steps.compare_tags.outputs.version_released }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensure all history is fetched, including tags

      - name: Fetch all tags
        run: git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch the current tag before release
        id: get_previous_tag
        run: |
          previous_tag=$(git tag --sort=creatordate | tail -n 1)
          if [ -z "$previous_tag" ]; then
            previous_tag="none"
          fi
          echo "Previous tag: $previous_tag"
          echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT

      - name: Generate Version Tag
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 22
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git 
          branches: |
            ['main']
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch the current tag after release
        id: get_current_tag
        run: |
          current_tag=$(git tag --sort=creatordate | tail -n 1)
          echo "Current tag: $current_tag"
          echo "current_tag=$current_tag" >> $GITHUB_OUTPUT
          echo "tag_version=$current_tag" >> $GITHUB_OUTPUT

      - name: Compare tags and determine if a new version was released
        id: compare_tags
        run: |
          if [ "${{ steps.get_previous_tag.outputs.previous_tag }}" = "${{ steps.get_current_tag.outputs.current_tag }}" ]; then
            echo "No new tag was created. Setting version_released to false."
            echo "version_released=false" >> $GITHUB_OUTPUT
          else
            echo "A new tag was created. Setting version_released to true."
            echo "version_released=true" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

  build_push_tag_app:
    runs-on: ubuntu-latest
    needs: [release]  
    if: ${{ needs.release.outputs.version_released == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Build info
        env:
          VERSION: ${{ needs.release.outputs.tag_version }}
          IMAGE_TAG: ${{ needs.release.outputs.tag_version }}
        run: |
          echo "Building version: $VERSION"
          echo "Image tag: $IMAGE_TAG"
          echo "Commit SHA: ${{ github.sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ needs.release.outputs.tag_version }}
          VERSION: ${{ needs.release.outputs.tag_version }}
          ECR_URL: ${{ steps.login-ecr.outputs.registry }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Dockerfile
          provenance: false
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.source=${{ github.event.repository.clone_url }}
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ env.ECR_URL }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_URL }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Image info
        env:
          ECR_URL: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ needs.release.outputs.tag_version }}
        run: |
          echo "::notice::Image pushed: ${{ env.ECR_URL }}/${{ env.ECR_REPO }}:${{ env.IMAGE_TAG }}"
