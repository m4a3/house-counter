name: Generate SemVer Tag and Build Env Versions
on:
  push:
    branches: [ main-test ]
  workflow_dispatch:

env:
  GH_PACKAGE_ACCESS_TOKEN: ${{ secrets.GH_PACKAGE_ACCESS_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: eu-west-1 
  ECR_REPO: house-counter-tags

jobs:
  release:
    runs-on: ubuntu-latest

    outputs:
      tag_version: ${{ steps.get_current_tag.outputs.tag_version }}
      previous_tag: ${{ steps.get_previous_tag.outputs.previous_tag }}
      version_released: ${{ steps.compare_tags.outputs.version_released }}

    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0  # Ensure all history is fetched, including tags

      - name: Fetch all tags
        run: git fetch --tags

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Fetch the current tag before release
        id: get_previous_tag
        run: |
          previous_tag=$(git tag --sort=creatordate | tail -n 1)
          if [ -z "$previous_tag" ]; then
            previous_tag="none"
          fi
          echo "Previous tag: $previous_tag"
          echo "::set-output name=previous_tag::$previous_tag"

      - name: Generate Version Tag
        uses: cycjimmy/semantic-release-action@v2.5.4
        with:
          semantic_version: 18.0.0
          extra_plugins: |
            @semantic-release/changelog@5.0.1
            @semantic-release/git 
          branches: |
            ['main-test']
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch the current tag after release
        id: get_current_tag
        run: |
          current_tag=$(git tag --sort=creatordate | tail -n 1)
          echo "Current tag: $current_tag"
          echo "::set-output name=current_tag::$current_tag"
          echo "::set-output name=tag_version::$current_tag"

      - name: Compare tags and determine if a new version was released
        id: compare_tags
        run: |
          if [ "${{ steps.get_previous_tag.outputs.previous_tag }}" = "${{ steps.get_current_tag.outputs.current_tag }}" ]; then
            echo "No new tag was created. Setting version_released to false."
            echo "::set-output name=version_released::false"
          else
            echo "A new tag was created. Setting version_released to true."
            echo "::set-output name=version_released::true"
          fi
        continue-on-error: true

  build_push_tag:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.version_released == 'true' || github.event_name == 'workflow_dispatch' }}  # Run if new version released OR manually triggered

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          IMAGE_TAG: ${{ needs.release.outputs.tag_version }}
          ECR_URL: 245475270127.dkr.ecr.eu-west-1.amazonaws.com
        run: |
          docker build \
            --build-arg APP_VERSION=$IMAGE_TAG \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -t $ECR_URL/$ECR_REPO:$IMAGE_TAG . -f Dockerfile
          docker push $ECR_URL/$ECR_REPO:$IMAGE_TAG
          docker tag $ECR_URL/$ECR_REPO:$IMAGE_TAG $ECR_URL/$ECR_REPO:dev
          docker push $ECR_URL/$ECR_REPO:dev