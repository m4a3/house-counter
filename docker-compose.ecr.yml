# Use images built and pushed by CI (ECR). Set before running:
#   export ECR_REGISTRY=123456789012.dkr.ecr.eu-west-1.amazonaws.com
#   export IMAGE_TAG=main  # or a semver tag e.g. v1.0.0, or commit SHA
# Then: docker compose -f docker-compose.ecr.yml up -d
# Log in to ECR first:
#   aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin $ECR_REGISTRY

services:
  house-counter:
    image: ${ECR_REGISTRY}/house-counter-tags:house-counter-${IMAGE_TAG:-latest}
    expose:
      - "8008"
    volumes:
      - building_cache:/app/building_cache
      - contributions:/app/contributions
    env_file:
      - .env
    restart: unless-stopped

  front-back-garden:
    image: ${ECR_REGISTRY}/house-counter-tags:front-back-garden-${IMAGE_TAG:-latest}
    expose:
      - "8000"
    volumes:
      - garden_output:/app/output
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: ${ECR_REGISTRY}/house-counter-tags:nginx-${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - house-counter
      - front-back-garden
    restart: unless-stopped

volumes:
  building_cache:
  contributions:
  garden_output:
